<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("churnForm");
    const resultBox = document.getElementById("result");
    

    form.addEventListener("submit", async function (e) {

        e.preventDefault();

        console.log("Form submitted");

        const formData = new FormData(form);
        const data = {};

        formData.forEach((v, k) => {
            if (!isNaN(v) && v !== "") {
                data[k] = parseFloat(v);
            } else {
                data[k] = v;
            }
        });

        console.log("Payload to send:", data);

        try {

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            console.log("Raw response:", response);

            const result = await response.json();

            console.log("Parsed JSON result:", result);

            if (result.prediction !== undefined) {

                const churn = result.prediction === 1
                    ? "Customer will churn"
                    : "Customer will stay";

                resultBox.innerText =
                    churn + " (probability: " + result.probability.toFixed(3) + ")";

            } else {

                console.warn("No 'prediction' in response", result);
                resultBox.innerText = "Prediction missing in response";

            }

        } catch (err) {

            console.error("Error during fetch:", err);
            resultBox.innerText = "Error predicting churn. See console.";

        }

    });

});
</script>
